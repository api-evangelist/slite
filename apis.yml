    name: Slite API
    description: >-
      The Slite Public API provides programmatic access to your workspace
      enabling you to create, update, search, and delete notes and documents.
      Manage knowledge base content, users, groups, and leverage AI-powered
      Ask search capabilities via REST endpoints authenticated with a personal
      API key.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
