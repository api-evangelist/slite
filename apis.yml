aid: slite
name: Slite
description: >-
  Slite is a collaborative documentation and knowledge base platform with a
  REST API for managing notes, channels, documents, templates, and team
  knowledge bases. It enables asynchronous work through AI-powered search,
  document creation, and automated knowledge management workflows. The Slite
  Public API provides programmatic access to workspaces using Bearer token
  authentication and follows the OpenAPI v3.0 standard.
